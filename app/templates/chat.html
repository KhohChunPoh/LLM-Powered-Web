{%extends "base.html"%}



{%block content%}

<div id="scrollarea" style="font-size:14px; min-height:200px; overflow-y:auto;border:2px solid;border-color:#00000060 ;border-radius:5px;text-align:left ;flex-grow:1;background-color:#c0c0c0">
    {%for log in logs%}
    {%if log.role == "model"%}
    <div style="text-align: left; margin: 0; padding:0px 1px 5px">
        <p style="margin:0;display:inline-block">Assistant</p>
        <br />
        <p style="white-space:pre-wrap; display: inline-block;margin:0; border:1px solid;border-radius:5px;padding:3px 5px" class="border border-success bg-success-subtle">{{log.log}}</p>

    </div>



    {%else%}

    <div style="text-align:right;padding:0px 1px 5px;margin:0">
        <p style="margin:0;display:inline-block">{{name}}</p>
        <br />
        <p style="text-align:left; white-space: pre-wrap; display: inline-block; margin: 0; border: 1px solid; border-radius: 5px; padding: 3px 5px" class="border border-success bg-success-subtle">{{log.log}}</p>

    </div>


    {%endif%}


    {%endfor%}


</div>


<div class="d-flex justify-content-center align-items-end">
    <form method="POST" action="">
        {% csrf_token%}
        <div class="input-group mb-5" style="justify-content:center">

                <button type="submit" name="delete" formnovalidate class="btn btn-danger btn-lg" style=" width: 150px; background-color: #e08080; font-size: 20px; color: #0f0f0f; border: double">Delete</button>
            
                <textarea name="prompt" rows="6" cols="500" required minlength="1" class="form-control" style="border:double"></textarea>

            
            <button type="submit" name="submit" class="btn btn-primary btn-lg" style="width:150px;background-color:#8080e0; font-size: 20px;color: #0f0f0f;border:double">Ask</button>


        </div>
    </form>
</div>


<script>
    const element = document.getElementById("scrollarea");
    element.scrollTop = element.scrollHeight;

    let loading = false;

    document.querySelector("form").addEventListener("submit", async function (e) {

        if (e.submitter?.name !== "submit") return;

        e.preventDefault();

        if (loading) return;

        loading = true;

        const submitBtn = this.querySelector("[name=submit]");
        submitBtn.disabled = true;

        const input = this.querySelector("[name=prompt]");

        const name = "{{name}}";
        const log = document.getElementById("scrollarea");
        log.innerHTML += `<div style="text-align:right;padding:0px 1px 5px;margin:0"><p style="margin:0;display:inline-block">${name}</p><br/><p style="text-align:left;white-space:pre-wrap;display:inline-block;margin:0;border:1px solid;border-radius:5px;padding:3px 5px" class="border border-success bg-success-subtle">${input.value}</p></div>`;

        const replyDiv = document.createElement("div");
        replyDiv.style = "text-align:left;margin:0;padding:0px 1px 5px";
        replyDiv.innerHTML = `<p style="margin:0;display:inline-block">Assistant</p><br/><p style="white-space:pre-wrap;display:inline-block;margin:0;border:1px solid;border-radius:5px;padding:3px 5px" class="border border-success bg-success-subtle"></p>`;
        log.appendChild(replyDiv);
        const textP = replyDiv.querySelector("p:last-child");

        const formData = new FormData(this);
        formData.append("submit", "1");

        const reader = (await fetch("", { method: "POST", body: formData })).body.getReader();
        const decoder = new TextDecoder();

        while (true) {

            const { done, value } = await reader.read();
            if (done) break;
            textP.textContent += decoder.decode(value);
            log.scrollTop = log.scrollHeight;

        }

        input.value = "";
        loading = false;
        submitBtn.disabled = false;
    });
</script>

{%endblock%}
